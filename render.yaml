services:
  - type: web
    name: expense-tracker-backend
    env: node
    rootDir: Backend
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.x
      - key: NPM_CONFIG_FORCE
        value: true
    plan: free
